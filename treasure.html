<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>开宝箱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0015 100%);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    user-select: none; -webkit-user-select: none;
  }

  .scene { position: relative; width: 260px; height: 260px; }

  /* ---- 宝箱 ---- */
  .chest {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    transition: transform 0.3s;
    z-index: 2;
  }
  .chest:active { transform: translateX(-50%) scale(0.95); }

  .chest-body {
    width: 160px; height: 110px;
    background: linear-gradient(180deg, #c7994b 0%, #8b5e2f 40%, #6b3f1f 100%);
    border-radius: 12px 12px 16px 16px;
    box-shadow:
      0 8px 30px rgba(180, 120, 30, 0.5),
      inset 0 2px 0 rgba(255, 220, 150, 0.3);
    position: relative;
  }
  .chest-stripe {
    position: absolute; top: 50%; left: 0; right: 0; height: 12px;
    background: linear-gradient(180deg, #d4a850, #8b5e2f, #d4a850);
    transform: translateY(-50%);
    box-shadow: 0 0 10px rgba(255, 200, 60, 0.5);
  }
  .chest-lock {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    background: radial-gradient(circle, #ffd700, #daa520);
    border-radius: 50%;
    box-shadow: 0 0 20px rgba(255, 215, 0, 0.8), 0 0 40px rgba(255, 200, 0, 0.4);
    z-index: 3;
    transition: all 0.3s;
  }
  .chest-lock::after {
    content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 14px; height: 14px;
    background: #5c3a1e; border-radius: 2px;
  }

  /* ---- 宝箱盖 ---- */
  .chest-lid {
    width: 170px; height: 50px;
    background: linear-gradient(180deg, #e8c55a, #c7994b 40%, #9b692f 100%);
    border-radius: 16px 16px 4px 4px;
    position: absolute; top: -46px; left: -5px;
    box-shadow: 0 4px 20px rgba(180, 120, 30, 0.4), inset 0 2px 0 rgba(255, 230, 160, 0.4);
    transform-origin: center bottom;
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 4;
  }

  /* 打开状态 */
  .chest.opened .chest-lid {
    transform: rotateX(-120deg);
  }
  .chest.opened .chest-lock {
    opacity: 0; transform: translate(-50%, -50%) scale(0.5);
  }

  /* ---- 光芒 ---- */
  .glow {
    position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
    width: 100px; height: 100px;
    background: radial-gradient(circle, rgba(255, 215, 0, 0.4) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none; z-index: 1;
    opacity: 0; transition: all 0.8s;
  }
  .chest.opened ~ .glow { opacity: 1; width: 200px; height: 200px; bottom: 30px; }

  /* ---- 宝珠 ---- */
  .pearl {
    position: absolute; width: 28px; height: 28px;
    background: radial-gradient(circle at 35% 35%, #fff, #ffd700 30%, #ff8c00 70%);
    border-radius: 50%;
    box-shadow: 0 0 16px rgba(255, 200, 0, 0.9), 0 0 32px rgba(255, 180, 0, 0.5);
    pointer-events: none; z-index: 5;
    opacity: 0; transform: scale(0);
  }

  /* ---- 结果浮层 ---- */
  .result {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    display: flex; flex-direction: column; align-items: center;
    justify-content: center;
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 0.5s;
  }
  .result.show { opacity: 1; pointer-events: auto; }

  .result-card {
    background: linear-gradient(145deg, #2a1050, #1a0a30);
    border: 2px solid rgba(255, 215, 0, 0.5);
    border-radius: 24px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(255, 200, 0, 0.2);
    animation: cardIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes cardIn {
    from { transform: scale(0.5); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }

  .result-icon {
    font-size: 64px; margin-bottom: 8px;
    animation: bounce 0.6s ease-in-out infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-12px); }
  }

  .result-label { color: #e8c55a; font-size: 18px; margin-bottom: 4px; letter-spacing: 2px; }
  .result-amount {
    color: #ffd700; font-size: 56px; font-weight: bold;
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.7), 0 0 40px rgba(255, 200, 0, 0.4);
    margin-bottom: 4px;
  }
  .result-unit { color: #d4a850; font-size: 16px; margin-bottom: 24px; }
  .result-btn {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a0a2e; font-size: 18px; font-weight: bold;
    border: none; border-radius: 50px;
    padding: 14px 48px; cursor: pointer;
    letter-spacing: 2px;
    box-shadow: 0 6px 20px rgba(255, 160, 0, 0.4);
    transition: transform 0.2s;
  }
  .result-btn:active { transform: scale(0.95); }

  /* ---- 标题 ---- */
  .title {
    color: #e8c55a; font-size: 22px; font-weight: bold;
    letter-spacing: 6px; margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255, 200, 60, 0.6);
    z-index: 10;
  }
  .subtitle {
    color: rgba(255, 220, 180, 0.6); font-size: 13px;
    letter-spacing: 2px; margin-bottom: 20px; z-index: 10;
  }

  /* ---- 背景星点 ---- */
  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
  }

  /* ---- 飘出粒子 ---- */
  .particle {
    position: fixed; pointer-events: none; z-index: 50;
    font-size: 18px; font-weight: bold;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.8);
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0%   { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-120px) scale(1.5); }
  }
</style>
</head>
<body>

<div class="title">🔮 神 秘 宝 箱 🔮</div>
<div class="subtitle">点击宝箱，开启惊喜</div>

<div class="scene" id="scene">
  <div class="chest" id="chest">
    <div class="chest-lid"></div>
    <div class="chest-body">
      <div class="chest-stripe"></div>
      <div class="chest-lock"></div>
    </div>
  </div>
  <div class="glow"></div>
</div>

<div class="result" id="result">
  <div class="result-card">
    <div class="result-icon">💎</div>
    <div class="result-label">恭喜获得</div>
    <div class="result-amount">66</div>
    <div class="result-unit">宝 珠</div>
    <button class="result-btn" onclick="closeResult()">收 下</button>
  </div>
</div>

<div class="stars" id="stars"></div>

<script>
const chest = document.getElementById('chest');
const result = document.getElementById('result');
const scene = document.getElementById('scene');
const starsEl = document.getElementById('stars');

let opened = false;

// ---- 背景星星 ----
function createStars() {
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.style.cssText = `
      position: absolute;
      width: ${1 + Math.random() * 3}px;
      height: ${1 + Math.random() * 3}px;
      background: #fff;
      border-radius: 50%;
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      opacity: ${0.2 + Math.random() * 0.5};
      box-shadow: 0 0 ${2 + Math.random() * 4}px rgba(255,255,255,0.5);
      animation: twinkle ${2 + Math.random() * 3}s ease-in-out infinite;
      animation-delay: ${Math.random() * 3}s;
    `;
    starsEl.appendChild(s);
  }
}
createStars();

const twinkleStyle = document.createElement('style');
twinkleStyle.textContent = `
  @keyframes twinkle {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.7; }
  }
`;
document.head.appendChild(twinkleStyle);

// ---- 生成宝珠 ----
function spawnPearls() {
  const chestRect = chest.getBoundingClientRect();
  const cx = chestRect.left + chestRect.width / 2;
  const cy = chestRect.top + chestRect.height / 3;
  const count = 18;

  for (let i = 0; i < count; i++) {
    const pearl = document.createElement('div');
    pearl.className = 'pearl';
    pearl.style.cssText = `
      left: ${cx}px;
      top: ${cy}px;
      width: ${20 + Math.random() * 20}px;
      height: ${20 + Math.random() * 20}px;
      box-shadow: 0 0 ${12 + Math.random() * 12}px rgba(255,200,0,0.9),
                  0 0 ${24 + Math.random() * 24}px rgba(255,180,0,0.5);
    `;
    document.body.appendChild(pearl);

    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8;
    const dist = 80 + Math.random() * 140;
    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist - 60;
    const delay = i * 30;

    pearl.animate([
      { opacity: 0, transform: 'translate(0, 0) scale(0)' },
      { opacity: 1, transform: 'translate(0, 0) scale(0.8)', offset: 0.1 },
      { opacity: 1, transform: `translate(${dx * 0.6}px, ${dy * 0.6}px) scale(1.1)`, offset: 0.5 },
      { opacity: 0, transform: `translate(${dx}px, ${dy}px) scale(0.3)`, offset: 1 },
    ], {
      duration: 800 + Math.random() * 400,
      delay: delay,
      easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
      fill: 'forwards',
    }).onfinish = () => pearl.remove();

    // 同时生成"宝珠"文字粒子
    if (i % 3 === 0) {
      spawnParticle(cx, cy - 20, delay);
    }
  }
}

// ---- 飘出的文字粒子 ----
function spawnParticle(x, y, delay) {
  const el = document.createElement('div');
  el.className = 'particle';
  el.textContent = ['宝珠', '宝石', '💰', '✨', '💎'][Math.floor(Math.random() * 5)];
  el.style.left = x + (Math.random() - 0.5) * 60 + 'px';
  el.style.top = y + 'px';
  el.style.animationDelay = delay + 'ms';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ---- 开宝箱 ----
function openChest() {
  if (opened) return;
  opened = true;

  chest.classList.add('opened');
  spawnPearls();

  // 显示结果浮层
  setTimeout(() => {
    result.classList.add('show');
  }, 1200);
}

// ---- 关闭结果 ----
function closeResult() {
  result.classList.remove('show');
  // 可以在这里做后续逻辑，比如跳转、记录等
}

// ---- 事件 ----
chest.addEventListener('click', openChest);
chest.addEventListener('touchend', (e) => {
  e.preventDefault();
  openChest();
});

// 点击结果浮层空白处也可关闭
result.addEventListener('click', (e) => {
  if (e.target === result) closeResult();
});
</script>

</body>
</html>
